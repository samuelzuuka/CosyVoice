services:
  cosyvoice:
    build:
      context: .
      dockerfile: docker/Dockerfile.gpu
    image: cosyvoice-webui:latest-gpu
    container_name: cosyvoice-gpu
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${COSYVOICE_MODELS_PATH:-./models}:/workspace/CosyVoice/pretrained_models
    environment:
      - WEBUI_PORT=8000
      - MODEL_DIR=pretrained_models/CosyVoice-300M
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    shm_size: "2gb"
    runtime: nvidia
