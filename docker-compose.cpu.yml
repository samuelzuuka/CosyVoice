services:
  cosyvoice:
    build:
      context: .
      dockerfile: docker/Dockerfile.cpu
    image: cosyvoice-webui:latest
    container_name: cosyvoice
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ${COSYVOICE_MODELS_PATH:-./models}:/workspace/CosyVoice/pretrained_models
    environment:
      - WEBUI_PORT=8000
      - MODEL_DIR=pretrained_models/CosyVoice-300M
      - CUDA_VISIBLE_DEVICES=""
    shm_size: "2gb"
